# ── nginx: DEVELOPMENT configuration ─────────────────────────────────────────
# Routes all traffic through a single entry point: http://localhost:8080
#
#   /api/*  → FastAPI backend (uvicorn, port 8000)
#   /ws/*   → WebSocket connections on backend
#   /*      → Vite dev server (HMR enabled, port 3000)
#
# Vite HMR (Hot Module Replacement) requires special handling:
#   - The /__vite_hmr and /@vite paths need WebSocket upgrade headers
#   - Without this, file changes won't auto-reload the browser

events {
    worker_connections 512;
}

http {
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Backend WebSocket ─────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Vite HMR WebSocket ────────────────────────────────────────────────
        location /__vite_hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ── Frontend (Vite dev server) ────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Required for Vite HMR to work through a proxy
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }
    }
}
