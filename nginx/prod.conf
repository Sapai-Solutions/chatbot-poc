# ── nginx: PRODUCTION configuration ──────────────────────────────────────────
# Routes all traffic through port 80 (map to host port in docker-compose.prod.yml)
#
#   /api/*  → FastAPI backend (gunicorn + UvicornWorker)
#   /ws/*   → WebSocket connections on backend
#   /*      → Frontend nginx container (serving pre-built static files)
#
# Production additions vs dev:
#   - Gzip compression for text assets
#   - Security headers (X-Frame-Options, X-Content-Type-Options, XSS protection)
#   - Larger client_max_body_size for file uploads
#   - Long proxy read timeout for heavy API calls

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Reduces transfer size for text-based assets by ~70%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;  # frontend container is nginx:alpine in prod
    }

    server {
        listen 80;
        server_name _;  # Replace with your domain in production

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            client_max_body_size 50M;

            # Disable buffering for SSE streaming endpoints
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── Backend WebSocket ─────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Frontend (static files via frontend nginx container) ──────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
