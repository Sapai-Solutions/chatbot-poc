# Frontend SPA routing config (used inside the frontend production container)
# This is NOT the main nginx proxy config (that's in nginx/prod.conf).
#
# WHY try_files with /index.html:
#   React Router handles routing client-side. When a user refreshes /dashboard
#   or navigates directly to /settings, nginx must serve index.html (not 404)
#   so React can boot and handle the route itself.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes → serve index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
